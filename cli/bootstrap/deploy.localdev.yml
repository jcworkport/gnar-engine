config:
  core-version: 1
  architecture: microservice
  region: eu-west-2
  environment: localdev
  namespace: my-project
  services:
    - name: control
      listener_rules:
        paths:
          - /control
          - /tasks
      min_tasks: 1
      max_tasks: 1
      depends_on:
        - control-db
      command:
        - npm
        - run
        - start:dev
      ports:
        - '4001:3000'
    - name: user
      listener_rules:
        paths:
          - /authenticate
          - /users
      min_tasks: 1
      max_tasks: 1
      depends_on:
        - user-db
      command:
        - npm
        - run
        - start:dev
      ports:
        - '4002:3000'
    - name: portal
      listener_rules:
        paths:
          - /portal
      min_tasks: 1
      max_tasks: 1
      command:
        - npm
        - run
        - dev
      ports:
        - '4003:3000'
